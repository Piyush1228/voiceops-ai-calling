services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: voiceops_user
      POSTGRES_PASSWORD: voiceops_pass
      POSTGRES_DB: voiceops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://voiceops_user:voiceops_pass@db:5432/voiceops_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data: